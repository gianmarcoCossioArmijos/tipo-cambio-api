<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tipo de Cambio API</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f6fb;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      .container {
        width: min(700px, 100%);
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.12);
        padding: 28px;
      }
      h1 {
        margin-top: 0;
        color: #1e293b;
      }
      .actions {
        display: grid;
        gap: 12px;
        margin: 20px 0;
      }
      button {
        border: none;
        border-radius: 10px;
        padding: 14px 18px;
        font-size: 1rem;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }
      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 25px rgba(15, 23, 42, 0.1);
      }
      button.primary {
        background: #2563eb;
        color: white;
      }
      button.warning {
        background: #fb923c;
        color: white;
      }
      button.error {
        background: #ef4444;
        color: white;
      }
      pre {
        background: #f8fafc;
        border-radius: 12px;
        padding: 18px;
        overflow-x: auto;
        white-space: pre-wrap;
        word-break: break-word;
        border: 1px solid #e2e8f0;
      }
      .note {
        color: #475569;
        margin: 0;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Frontend de Tipo de Cambio</h1>
      <p class="note">Usa los botones para invocar los endpoints del servidor y ver la respuesta JSON.</p>
      <div class="actions">
        <label>
          Backend host:
          <input type="text" id="backend-host" value="http://localhost:3000" placeholder="http://localhost:3000" />
        </label>
        <button class="primary" id="fetch-rate">Obtener tipo de cambio</button>
        <button class="warning" id="fetch-error-500">Probar error 500</button>
        <button class="error" id="fetch-error-404">Probar error 404</button>
        <button class="secondary" id="fetch-db-health">Probar conexión a DB</button>
      </div>
      <section>
        <h2>Respuesta</h2>
        <pre id="output">Haz clic en un botón para enviar una solicitud.</pre>
      </section>
    </div>
    <script src="app.js"></script>
  </body>
</html>
